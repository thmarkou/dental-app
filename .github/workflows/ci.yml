name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: TypeScript
        run: npm run type-check

      - name: Environment template check
        run: |
          cp env.dentalapp.example .env.dentalapp
          npm run env:secrets -- --write
          npm run env:check

      - name: Unit tests
        run: npm test -- --ci --coverage=false
